    <style>
        :root {
            --primary-color: #4154f1; /* Cor principal do seu template */
            --text-color: #012970;
            --bg-color: #f6f9ff;
            --white: #FFFFFF;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;

        }
        .container {
            max-width: 680px;

            padding: 20px;

        }
        .profile-header {

        .profile-title {
            font-size: 1.5rem;

            margin: 0;
        }
        .profile-subtitle {
            font-size: 1rem;
            font-weight: 400;
            color: #555;
        }
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .link-btn {
            display: block;
            background-color: var(--white);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .link-btn:hover {
            background-color: var(--primary-color);
            color: var(--white);
            transform: scale(1.03);
        }
        /* Botão de Destaque */
        .link-btn.highlight {
            background-color: var(--primary-color);
            color: var(--white);
        }
        .link-btn.highlight:hover {
            background-color: #3144d3;
        }
        .footer {
            padding: 20px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
